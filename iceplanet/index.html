<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ice Planet</title>
    <style>
      :root {
        --text: #eaf4ff;
        --muted: #a8c0d8;
        --accent: #7fd6ff;
        --panel: rgba(17, 27, 46, 0.92);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, rgba(56, 189, 248, 0.16), transparent 34%),
          linear-gradient(180deg, #09111d 0%, #0d1728 100%);
        color: var(--text);
        font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }
      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 40px 18px 56px;
      }
      .hero {
        background: var(--panel);
        border: 1px solid rgba(127, 214, 255, 0.18);
        border-radius: 22px;
        padding: 26px 22px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      }
      h1, h2, p { margin: 0; }
      h1 {
        font-size: 34px;
        line-height: 1.15;
        color: #dff6ff;
      }
      .subtitle {
        margin-top: 10px;
        color: var(--muted);
        font-size: 15px;
      }
      .section {
        margin-top: 22px;
        padding-top: 22px;
        border-top: 1px solid rgba(127, 214, 255, 0.14);
      }
      .section h2 {
        font-size: 20px;
        color: var(--accent);
      }
      .links {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }
      .card {
        display: block;
        padding: 16px 16px;
        border-radius: 16px;
        background: rgba(11, 18, 32, 0.46);
        border: 1px solid rgba(127, 214, 255, 0.16);
        color: var(--text);
        text-decoration: none;
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      }
      .card:hover {
        transform: translateY(-1px);
        border-color: rgba(127, 214, 255, 0.32);
        background: rgba(13, 23, 40, 0.68);
      }
      .card-title {
        font-size: 18px;
        font-weight: 700;
        color: #ecf8ff;
      }
      .card-desc {
        margin-top: 4px;
        color: var(--muted);
        font-size: 14px;
      }
      .footer {
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
      }
      a.inline {
        color: #9fe3ff;
        text-decoration: none;
      }
      a.inline:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <h1>Ice Planet</h1>
        <p class="subtitle">Official policy and support links for the game.</p>

        <div class="section">
          <h2>문서 / Documents</h2>
          <div class="links">
            <a class="card" href="./privacy-policy.html">
              <div class="card-title">개인정보처리방침 / Privacy Policy</div>
              <div class="card-desc">앱에서 처리하는 정보와 이용 목적을 안내합니다.</div>
            </a>
            <a class="card" href="./terms-of-service.html">
              <div class="card-title">이용약관 / Terms of Service</div>
              <div class="card-desc">앱 이용과 주간 랭킹 운영에 관한 기본 안내입니다.</div>
            </a>
          </div>
        </div>

        <div class="section">
          <h2>문의 / Contact</h2>
          <p class="subtitle">이메일로 문의하실 수 있습니다.</p>
          <p><a class="inline" href="mailto:iceplanetgame@gmail.com">iceplanetgame@gmail.com</a></p>
        </div>

        <p class="footer">Ice Planet · <a class="inline" href="https://dreamy3g.github.io/iceplanet/">dreamy3g.github.io/iceplanet</a></p>
      </div>
    </div>
  </body>
</html>
